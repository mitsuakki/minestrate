env: dev

server:
  port: 8080
  tls_cert: ""
  tls_key: ""

auth:
  jwt_secret: "your-secret"
  token_ttl: 300

docker:
  socket: "npipe:////./pipe/docker_engine"
  image: pmmp/pocketmine-mp:latest
  cpu_limit: 1.0
  memory_limit: 512m

orchestrator:
  workers: 4
  max_servers: 100
  start_timeout: 30

ports:
  range_start: 19132
  range_end: 20132

network:
  mode: "simple" # "simple" ou "isolated"
  subnet_block: "172.20.0.0/14"
  default_network: "minestrate-global"
  enable_fallback: true
